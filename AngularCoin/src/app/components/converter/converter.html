<div class="converter-container">
  <h2>Conversor de Moedas</h2>

  <div *ngIf="isOffline" class="offline-banner">
    ⚠️ {{ errorMessage }}
  </div>

  <div class="form-group">
    <label>Valor</label>
    <input type="number" [(ngModel)]="amount" min="0" />
  </div>

  <div class="form-group">
    <label>De</label>
    <select [(ngModel)]="fromCurrency" (change)="loadRates()">
      <option *ngFor="let c of currencies" [value]="c">{{ c }}</option>
    </select>
  </div>

  <div class="form-group">
    <label>Para</label>
    <select [(ngModel)]="toCurrency">
      <option *ngFor="let c of currencies" [value]="c">{{ c }}</option>
    </select>
  </div>

  <button (click)="convert()">Converter</button>

  <div *ngIf="result !== null" class="result">
    {{ amount }} {{ fromCurrency }} = 
    <strong>{{ result | number:'1.2-2' }} {{ toCurrency }}</strong>
  </div>
</div>
